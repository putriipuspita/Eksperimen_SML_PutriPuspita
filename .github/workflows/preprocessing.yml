name: Preprocessing Dataset

on:
  push:
    branches:
      - main

jobs:
  preprocessing:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install pandas

      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_putri.py

      - name: Upload Processed Dataset
        uses: actions/upload-artifact@v4
        with:
          name: customer_churn_preprocessing
          path: preprocessing/customer_churn_preprocessing.csv